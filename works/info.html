<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.js-hover-anim').forEach(el => {
    const text = el.textContent;
    el.textContent = '';

    [...text].forEach((ch, i) => {
      const span = document.createElement('span');

      if (ch === ' ') {
        span.className = 'space';
        span.innerHTML = '&nbsp;';
      } else {
        span.textContent = ch;
      }

      span.style.setProperty('--i', i);
      el.appendChild(span);
    });
  });
});
</script>
<script>
  (() => {

    // =========================
    // Header hover letters split
    // =========================
    function splitHoverLetters(el){
      if (!el || el.dataset.splitted === "1") return;

      const text = el.textContent;
      el.textContent = "";

      [...text].forEach((ch, i) => {
        const span = document.createElement("span");
        if (ch === " ") {
          span.className = "space";
          span.innerHTML = "&nbsp;";
        } else {
          span.textContent = ch;
        }
        span.style.setProperty("--i", i);
        el.appendChild(span);
      });

      el.dataset.splitted = "1";
    }

    document.querySelectorAll(".js-hover-anim").forEach(splitHoverLetters);

    // =========================
    // Reveal on scroll (IntersectionObserver)
    // =========================
    document.documentElement.classList.add("js");

    const isSp = window.matchMedia("(max-width: 768px)").matches;

    // PC: reveal .img-row as a block
    // SP: reveal each img/iframe individually
    const selector = isSp
      ? ".page-work .work-images img, .page-work .work-images iframe"
      : ".page-work .work-images > img, .page-work .work-images > iframe, .page-work .work-images > .img-row";

    const targets = document.querySelectorAll(selector);
    if (!targets.length) return;

    targets.forEach(el => el.classList.add("reveal-img"));

    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.classList.toggle("is-inview", entry.isIntersecting);
      });
    }, {
      threshold: 0.12,
      rootMargin: "0px 0px -10% 0px"
    });

    targets.forEach(el => io.observe(el));

  })();
  </script>
