<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Gallery</title>

  <style>
    :root {
      --header-h: 72px;
      --gutter-x: 30px;
      --tile-gap: 14px;
      --grid-cols: 12;
      --grid-row: clamp(52px, 6.2vw, 98px);
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--header-h);
      padding: 0 var(--gutter-x);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      z-index: 1000;
      background: #fff;
    }

    .header-container {
      width: 100%;
      display: flex;
      align-items: center;
    }

    .header-title {
      margin: 0;
      font-weight: 400;
      letter-spacing: 0.35em;
      font-size: 0.7rem;
    }

    .header-title__link,
    header nav a {
      text-decoration: none;
      color: #545454;
    }

    header nav {
      margin-left: auto;
    }

    header nav ul {
      display: flex;
      align-items: center;
      gap: 60px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    header nav a {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
    }

    #status {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 500;
      transition: opacity 0.25s ease;
    }

    .loading-overlay.is-hidden {
      opacity: 0;
    }

    .loading-dots {
      color: #545454;
      font-size: 1.5rem;
      letter-spacing: 0.2em;
    }

    .loading-dots span {
      animation: loadingPulse 1.05s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes loadingPulse {
      0%, 80%, 100% {
        opacity: 0.2;
        transform: translateY(0);
      }

      40% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    .gallery {
      width: 100%;
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;

      display: grid;
      grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr));
      grid-auto-rows: var(--grid-row);
      grid-auto-flow: dense;
      gap: var(--tile-gap);

      margin: 0;
      margin-top: var(--header-h);
      padding: var(--tile-gap);
      box-sizing: border-box;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery-item {
      width: 100%;
      height: 100%;
      min-height: 0;
      grid-column: span var(--col-span, 3);
      grid-row: span var(--row-span, 4);
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
    }

    .gallery-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background: #f5f5f5;
    }

    .gallery-inner img,
    .gallery-inner video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    @media (max-width: 800px) {
      :root {
        --header-h: 56px;
        --gutter-x: 16px;
        --tile-gap: 10px;
        --grid-cols: 8;
        --grid-row: clamp(48px, 11vw, 80px);
      }

      header nav ul {
        gap: 30px;
      }
    }

    @media (max-width: 500px) {
      :root {
        --grid-cols: 4;
        --grid-row: clamp(46px, 18vw, 72px);
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-container">
      <h1 class="header-title">
        <a href="profile.html" class="header-title__link">RYUJI MARUYAMA</a>
      </h1>

      <nav aria-label="global">
        <ul>
          <li><a href="index.html">in...</a></li>
          <li><a href="all.html">etc...</a></li>
          <li><a href="repeat.html">repeat...</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <p id="status">読み込み中...</p>

  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-dots">
      <span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <div class="gallery" id="gallery"></div>

  <script>
const gallery = document.getElementById("gallery");
const loadingOverlay = document.getElementById("loadingOverlay");

/* 🔥 ここに素材を直接書く */
const mediaItems = [
  "assets/01.mp4",
  "assets/02.mp4",
  "assets/03.webp",
  "assets/04.webp"
];

/* ========================= */

function setLoadingVisible(isVisible) {
  loadingOverlay.classList.toggle("is-hidden", !isVisible);
}

function createGalleryItem(src) {
  const item = document.createElement("div");
  item.className = "gallery-item";

  const inner = document.createElement("div");
  inner.className = "gallery-inner";

  if (src.endsWith(".mp4") || src.endsWith(".webm")) {
    const video = document.createElement("video");
    video.src = src;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.preload = "none";

    inner.appendChild(video);
  } else {
    const img = document.createElement("img");
    img.src = src;
    img.loading = "lazy";
    img.decoding = "async";

    inner.appendChild(img);
  }

  item.appendChild(inner);
  return item;
}

function hashString(value) {
  let hash = 0;
  for (let i = 0; i < value.length; i++) {
    hash = (hash << 5) - hash + value.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function getRandomSpanPair(seedKey) {
  const hash = hashString(seedKey);
  const patterns = [
    [2,3],[3,2],[3,3],[4,3],[3,4],[5,3],[3,5],[4,4],[6,4]
  ];

  const [col,row] = patterns[hash % patterns.length];
  return [col,row];
}

function buildGallery() {
  gallery.textContent = "";

  const fragment = document.createDocumentFragment();

  mediaItems.forEach((src) => {
    const item = createGalleryItem(src);

    const [colSpan,rowSpan] = getRandomSpanPair(src);
    item.style.setProperty("--col-span", colSpan);
    item.style.setProperty("--row-span", rowSpan);

    fragment.appendChild(item);
  });

  gallery.appendChild(fragment);

  setLoadingVisible(false);
}

/* ========================= */
/* スクロール操作 */

function setupPageWideScroll() {
  window.addEventListener("wheel", (e) => {
    e.preventDefault();
    gallery.scrollTop += e.deltaY;
  }, { passive: false });
}

function setupPageWideTouchScroll() {
  let startY = 0;

  window.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
  });

  window.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const currentY = e.touches[0].clientY;
    gallery.scrollTop += (startY - currentY);
    startY = currentY;
  }, { passive: false });
}

/* ========================= */

setupPageWideScroll();
setupPageWideTouchScroll();

setLoadingVisible(true);
buildGallery();
</script>
</body>
</html>
