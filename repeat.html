<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repeat | Ryuji Maruyama</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body.page-repeat {
      overflow: hidden;
      background: #f7f7f7;
    }

    .repeat-gallery {
      width: 100%;
      height: calc(100vh - var(--header-h));
      margin-top: var(--header-h);
      padding: 14px;
      box-sizing: border-box;
      overflow: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;

      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      grid-auto-rows: clamp(52px, 6.2vw, 98px);
      grid-auto-flow: dense;
      gap: 14px;
    }

    .repeat-gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery-item {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      grid-column: span var(--col-span, 3);
      grid-row: span var(--row-span, 4);
      background: #eee;
    }

    .gallery-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background: #f2f2f2;
    }

    .gallery-inner img,
    .gallery-inner video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    @media (max-width: 800px) {
      .repeat-gallery {
        padding: 10px;
        gap: 10px;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        grid-auto-rows: clamp(48px, 11vw, 80px);
      }
    }

    @media (max-width: 500px) {
      .repeat-gallery {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-auto-rows: clamp(46px, 18vw, 72px);
      }
    }
  </style>
</head>

<body class="page-repeat">
  <header>
    <div class="header-container">
      <h1 class="header-title">
        <a href="profile.html" class="header-title__link js-hover-anim">RYUJI MARUYAMA</a>
      </h1>

      <nav aria-label="global">
        <ul>
          <li><a href="index.html" class="nav-top js-hover-anim">in...</a></li>
          <li><a href="all.html" class="nav-all js-hover-anim">etc...</a></li>
          <li><a href="repeat.html" class="nav-repeat js-hover-anim">repeat...</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-dots">
      <span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <p id="status">読み込み中...</p>

  <div class="repeat-gallery" id="gallery"></div>

  <script>
  (() => {
    const gallery = document.getElementById("gallery");
    const loadingOverlay = document.getElementById("loadingOverlay");

    const mediaItems = [
      "photo&movie/01.mp4",
      "photo&movie/02.mp4",
      "photo&movie/03.webp",
      "photo&movie/04.webp"
    ];

    function splitHoverLetters(el) {
      if (!el || el.dataset.splitted === "1") return;

      const text = el.textContent;
      el.textContent = "";

      [...text].forEach((ch, i) => {
        const span = document.createElement("span");
        if (ch === " ") {
          span.className = "space";
          span.innerHTML = "&nbsp;";
        } else {
          span.textContent = ch;
        }
        span.style.setProperty("--i", i);
        el.appendChild(span);
      });

      el.dataset.splitted = "1";
    }

    document.querySelectorAll(".js-hover-anim").forEach(splitHoverLetters);

    function setLoadingVisible(isVisible) {
      loadingOverlay.classList.toggle("is-hidden", !isVisible);
    }

    function createGalleryItem(src) {
      const item = document.createElement("div");
      item.className = "gallery-item";

      const inner = document.createElement("div");
      inner.className = "gallery-inner";

      const fileName = src.toLowerCase();

      if (
        fileName.endsWith(".mp4") ||
        fileName.endsWith(".webm") ||
        fileName.endsWith(".mov")
      ) {
        const video = document.createElement("video");
        video.src = src;
        video.muted = true;
        video.loop = true;
        video.autoplay = true;
        video.playsInline = true;
        video.preload = "none";
        video.controls = false;

        inner.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.loading = "lazy";
        img.decoding = "async";

        inner.appendChild(img);
      }

      item.appendChild(inner);
      return item;
    }

    function hashString(value) {
      let hash = 0;

      for (let i = 0; i < value.length; i++) {
        hash = (hash << 5) - hash + value.charCodeAt(i);
        hash |= 0;
      }

      return Math.abs(hash);
    }

    function getRandomSpanPair(seedKey) {
      const hash = hashString(seedKey);
      const patterns = [
        [2, 3],
        [3, 2],
        [3, 3],
        [4, 3],
        [3, 4],
        [5, 3],
        [3, 5],
        [4, 4],
        [6, 4]
      ];

      const [col, row] = patterns[hash % patterns.length];

      return [col, row];
    }

    function buildGallery() {
      gallery.textContent = "";

      const fragment = document.createDocumentFragment();

      mediaItems.forEach((src) => {
        const item = createGalleryItem(src);

        const [colSpan, rowSpan] = getRandomSpanPair(src);
        item.style.setProperty("--col-span", colSpan);
        item.style.setProperty("--row-span", rowSpan);

        fragment.appendChild(item);
      });

      gallery.appendChild(fragment);
      setLoadingVisible(false);
    }

    function setupPageWideScroll() {
      window.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          gallery.scrollTop += event.deltaY;
        },
        { passive: false }
      );
    }

    function setupPageWideTouchScroll() {
      let startY = 0;

      window.addEventListener(
        "touchstart",
        (event) => {
          startY = event.touches[0].clientY;
        },
        { passive: true }
      );

      window.addEventListener(
        "touchmove",
        (event) => {
          event.preventDefault();

          const currentY = event.touches[0].clientY;
          gallery.scrollTop += startY - currentY;
          startY = currentY;
        },
        { passive: false }
      );
    }

    setupPageWideScroll();
    setupPageWideTouchScroll();

    setLoadingVisible(true);
    buildGallery();
  })();
  </script>
</body>
</html>
