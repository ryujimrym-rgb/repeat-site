  <script>
  (() => {
    function splitHoverLetters(el){
      if (!el || el.dataset.splitted === "1") return;

      const text = el.textContent;
      el.textContent = "";

      [...text].forEach((ch, i) => {
        const span = document.createElement("span");
        if (ch === " ") {
          span.className = "space";
          span.innerHTML = "&nbsp;";
        } else {
          span.textContent = ch;
        }
        span.style.setProperty("--i", i);
        el.appendChild(span);
      });

      el.dataset.splitted = "1";
    }

    document.querySelectorAll(".js-hover-anim").forEach(splitHoverLetters);
  })();
  </script>
<script>
(() => {
  // iOS Safariの下部ツールバーで“見える領域”が変わるのを補正
  const root = document.documentElement;
  const vv = window.visualViewport;

  if (!vv) return;

  const update = () => {
    // layout viewport (window.innerHeight) と visual viewport (vv.height/offsetTop) の差分 = 食い込み量
    const bottom = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    root.style.setProperty('--vv-bottom', bottom + 'px');
  };

  update();
  vv.addEventListener('resize', update);
  vv.addEventListener('scroll', update);
  window.addEventListener('orientationchange', () => setTimeout(update, 50));
})();
</script>
