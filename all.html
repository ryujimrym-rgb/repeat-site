  <!-- ALLページ固有で必要な分だけ -->
  <style>
    :root{
      --bg:#f7f7f7;
      --fg:#545454;
      --muted:#9a9a9a;
    }
    body{
      margin:0;
      color:var(--fg);
      background:var(--bg);
      font-family: "AXIS Std", "Noto Sans JP", sans-serif;


    }

    /* ========= 作品一覧グリッド ========= */
    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      row-gap:80px;
      column-gap:100px;
    }

    /* タブレット：2列 */
    @media (max-width: 1024px){
      .grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        row-gap:60px;
        column-gap:40px;
      }
    }

    /* スマホ：1列 */
    @media (max-width: 600px){
      .grid{
        grid-template-columns:1fr;
        row-gap:40px;
        column-gap:0;
      }
    }

    .card{
      text-decoration:none;
      color:inherit;
      display:block;
      opacity:0;
      transform:translateY(65px);
      transition:opacity .9s ease-out, transform .9s ease-out;
    }
    .card.is-visible{
      opacity:1;
      transform:translateY(0);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      background:#eee;
      overflow:hidden;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .meta{
      display:flex;
      gap:12px;
      margin-top:10px;
      font-size:.88rem;
      color:var(--muted);
      font-weight:200;
      align-items:baseline;
    }

    /* ALLページ：番号は非表示、日付を左寄せ */
    .page-all .meta .idx{ display:none; }
    .page-all .meta{ justify-content:flex-start; }
    .page-all .meta .label{
      flex:none;
      text-align:left;
      margin-left:0;
    }
    .page-all .meta .meta-alt{ margin-left:auto; }

    @media (max-width: 480px){
      main{ padding:80px 1.5em 40px; }
    }
    .thumb-video iframe{
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
/* iframe自体は一切操作できない */
.page-all .thumb-video iframe {
  pointer-events: none;
}

/* でも card 全体はクリックできる */
.page-all a.card {
  pointer-events: auto;
}

  </style>
</head>

    const grid = document.getElementById('grid');
    if (!grid) return;

    const pad3 = n => String(n).padStart(3,'0');

    // =========================
    // hover: header letters split
    // =========================
    function splitHoverLetters(el){
      if (!el || el.dataset.splitted === "1") return;
      const text = el.textContent;
      el.textContent = "";
      [...text].forEach((ch, i) => {
        const span = document.createElement("span");
        if (ch === " ") {
          span.className = "space";
          span.innerHTML = "&nbsp;";
        } else {
          span.textContent = ch;
        }
        span.style.setProperty("--i", i);
        el.appendChild(span);
      });
      el.dataset.splitted = "1";
    }
    document.querySelectorAll(".js-hover-anim").forEach(splitHoverLetters);

    // =========================
    // Build grid (newest first)
    // =========================
    const newestFirst = works.slice().reverse();

    newestFirst.forEach((w, i) => {
      const number = works.length - i;

      const a = document.createElement('a');
      a.className = 'card';
      a.href = w.url;

      const thumbHTML = (w.type === 'video')
  ? `
    <div class="thumb thumb-video">
      <iframe
        src="${w.video}"
        frameborder="0"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen
        tabindex="-1"
      ></iframe>
    </div>
  `
  : `
    <div class="thumb">
      <img src="${w.thumb}" alt="work ${pad3(number)}">
    </div>
  `;

a.innerHTML = `
  ${thumbHTML}
  <div class="meta">
    <span class="idx">${pad3(number)}</span>
    <span class="label">${w.label ?? ''}</span>
    <span class="meta-alt">${w.title ?? ''}</span>
  </div>
`;



      grid.prepend(a);

      // meta-alt: split to spans (for your nyoki animation in CSS)
      const alt = a.querySelector('.meta-alt');
      if (alt) {
        const t = alt.textContent.trim();
        alt.textContent = '';
        [...t].forEach((ch, j) => {
          const span = document.createElement('span');
          span.textContent = ch;
          span.style.setProperty('--i', j);
          alt.appendChild(span);
        });
      }
    });

    // =========================
    // Reveal cards on scroll
    // =========================
    const cards = document.querySelectorAll(".page-all .card");
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.classList.toggle("is-visible", entry.isIntersecting);
      });
    }, {
      threshold: 0.12,
      rootMargin: "0px 0px -10% 0px"
    });
    cards.forEach(card => io.observe(card));

    // =========================
    // Mobile: meta auto toggle
    // =========================
    const isSp = window.matchMedia("(max-width: 768px)").matches;
    if (isSp) {
      const metas = document.querySelectorAll(".page-all .meta");
      if (metas.length) {
        metas.forEach(meta => meta.classList.add("state-base"));
        let showAlt = false;

        setInterval(() => {
          showAlt = !showAlt;
          metas.forEach(meta => {
            if (showAlt) {
              meta.classList.remove("state-base", "from-alt");
              void meta.offsetWidth;
              meta.classList.add("state-alt");
            } else {
              meta.classList.remove("state-alt");
              void meta.offsetWidth;
              meta.classList.add("state-base", "from-alt");
            }
          });
        }, 4000);
      }
    }
