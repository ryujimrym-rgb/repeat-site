<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>INT. RYUJI MARUYAMA</title>

  <!-- AXIS Font (TypeSquare) -->
  <script src="//typesquare.com/servlet/tsweb.js?xxxxx"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-top">

  <!-- Opening -->
  <div class="site-title-video" id="titleScreen">
    <video id="titleVideo" autoplay muted playsinline webkit-playsinline>
      <source src="img/title_sp.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Header -->
  <header>
    <div class="header-container">
      <h1 class="header-title">
        <a href="profile.html" class="header-title__link js-hover-anim">RYUJI MARUYAMA</a>
      </h1>

      <nav aria-label="global">
        <ul>
          <li><a href="index.html" class="nav-top js-hover-anim">in...</a></li>
          <li><a href="all.html"   class="nav-all js-hover-anim">etc...</a></li>
          <li><a href="repeat.html" class="nav-repeat js-hover-anim">repeat...</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Hero (fullscreen slideshow) -->
  <div class="hero-slideshow" aria-live="polite" aria-label="works slideshow">
    <a id="heroLink" href="#" aria-label="作品詳細へ"></a>
  </div>

  <!-- for accessibility only -->
  <main id="top" aria-hidden="true"></main>

  <!-- Right list -->
  <aside class="works-list" aria-label="works list">
    <ul id="worksUl"></ul>
  </aside>

  <!-- Fullscreen preview (mobile tap) -->
  <div class="fullscreen-preview" id="fullscreenPreview" aria-hidden="true">
    <img id="fullscreenPreviewImg" src="" alt="">
  </div>

  <script>
  (() => {
    // =========================
    // Data
    // =========================
    const works = [
      { thumb:'img/shiro/shiro_01.webp',              label:'2023.6－2023.8',   url:'works/milk.html' },
      { thumb:'img/ripple/ripple_00.webp',            label:'2023.9－2023.12',  url:'works/ripple.html' },
      { thumb:'img/fireworks/fireworks_01.webp',      label:'2023.11－2023.12', url:'works/fireworks.html' },
      { thumb:'img/interactivetypo/interactive_6.webp', label:'2023.11－2023.12', url:'works/interactive.html' },
      { thumb:'img/experience/01.webp', label:'2023.10－2023.12', url:'works/experience.html' },
      { thumb:'img/omomukiiro/0000.webp',               label:'2023.11－2023.12', url:'works/omomuki.html' },
      { thumb:'img/wabisabi/wabisabi_01.webp',                 label:'2024.4－2024.6',   url:'works/wabisabi.html' },
      { thumb:'img/fractal_04.webp',                  label:'2024.6－2024.8',   url:'works/fractal.html' },
      { thumb:'img/kaiten/00.webp',                 label:'2024.7－2024.7',   url:'works/kaiten.html' },
      { thumb:'img/shikon/01.webp',            label:'2024.6－2024.8',   url:'works/shikon.html' },
      { thumb:'img/dekikatamovie/dekikatamovie_01.webp', label:'2024.9－2024.12', url:'works/dekikatamovie.html' },
      { thumb:'img/dekikata/dekikata1.webp',          label:'2024.9－2024.12',  url:'works/dekikata.html' },
      { thumb:'img/ak/ak_1.webp',                     label:'2025.4－2025.6',   url:'works/ak.html' },
      { thumb:'img/editorial/editorial_01.webp',      label:'2025.4－2025.8',   url:'works/editorial.html' },
      { thumb:'img/kotonohana/kotono_21.webp',        label:'2025.4－2025.8',   url:'works/kotonohana.html' },
      { thumb:'img/genkide/genkide_01.webp',          label:'2025.4－2025.8',   url:'works/genkideimasuka.html' },
      { thumb:'img/oekaki/oekaki_6.webp',             label:'2025.4－2025.8',   url:'works/oekaki.html' },
      { thumb:'img/info/info_01.webp',                label:'2025.9－2025.9',   url:'works/info.html' },
      { thumb:'img/ex/ex_01.webp',                    label:'2024.4－2025.11',  url:'works/ex.html' },
      { thumb:'img/voice/02.webp',                    label:'2025.9－2026.1',  url:'works/voice.html' },
      { thumb:'img/tsukurite/00.webp',                    label:'2025.10－2026.1',  url:'works/tsukurite.html' },
      { thumb:'img/symposium/sym_08.webp',                    label:'2026.1－2026.1',  url:'works/symposium.html' },
    ];

    const isTouchDevice =
      (window.matchMedia && window.matchMedia('(hover: none)').matches) ||
      ('ontouchstart' in window);

    const canHover =
      window.matchMedia && window.matchMedia('(hover: hover)').matches;

    const p3 = n => String(n).padStart(3, '0');

    // =========================
    // Utils
    // =========================
    function splitToSpans(el) {
      if (!el || el.dataset.splitted === '1') return;
      const text = el.textContent; // space keep
      el.textContent = '';

      [...text].forEach((ch, i) => {
        const span = document.createElement('span');
        if (ch === ' ') {
          span.className = 'space';
          span.innerHTML = '&nbsp;';
        } else {
          span.textContent = ch;
        }
        span.style.setProperty('--i', i);
        el.appendChild(span);
      });

      el.dataset.splitted = '1';
    }

    // =========================
    // 1) Hover animation (header links)
    // =========================
    document.querySelectorAll('.js-hover-anim').forEach(splitToSpans);

    // =========================
    // 2) Opening screen -> scrolled mode
    // =========================
    const titleScreen = document.getElementById('titleScreen');
    const titleVideo  = document.getElementById('titleVideo');

    function enterScrolledMode() {
      if (document.body.classList.contains('scrolled')) return;
      document.body.classList.add('scrolled');
      if (titleScreen) titleScreen.classList.add('hide');
      // 完全に消したいならCSSトランジション後に display:none でもOK
    }

    // video ended
    if (titleVideo) {
      titleVideo.muted = true;
      titleVideo.playsInline = true;
      titleVideo.addEventListener('ended', enterScrolledMode, { once: true });
    }

    // any interaction
    ['mousemove', 'mousedown', 'touchstart', 'wheel', 'scroll', 'keydown'].forEach(evt => {
      window.addEventListener(evt, enterScrolledMode, { once: true, passive: evt !== 'keydown' });
    });

    // =========================
    // 3) “Scroll once” behavior (if you still need it)
    //    → Openingを使うなら基本不要だけど、保険で残す
    // =========================
    let locked = false;
    function activateHeaderMode() {
      if (locked) return;
      locked = true;
      enterScrolledMode();
    }

    // PC wheel
    window.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) activateHeaderMode();
    }, { passive: true });

    // keyboard
    window.addEventListener('keydown', (e) => {
      if (['ArrowDown','ArrowUp','PageDown','PageUp',' '].includes(e.key)) activateHeaderMode();
    });

    // touch
    let touchStartY = null;
    let touchStartX = null;
    window.addEventListener('touchstart', (e) => {
      const t = e.touches && e.touches[0];
      if (!t) return;
      touchStartY = t.clientY;
      touchStartX = t.clientX;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (touchStartY == null) return;
      const t = e.touches && e.touches[0];
      if (!t) return;
      const dy = t.clientY - touchStartY;
      const dx = t.clientX - touchStartX;
      if (Math.abs(dy) > 10 && Math.abs(dy) > Math.abs(dx)) activateHeaderMode();
    }, { passive: true });

    // =========================
    // 4) Hero slideshow (crossfade, 2 images)
    // =========================
    const heroLink = document.getElementById('heroLink');
    const heroWrap = document.querySelector('.hero-slideshow');
    const worksForSlide = works.slice().reverse(); // newest first
    const DURATION = 2400;

    let slideIdx = 0;
    let timer = null;
    let showingA = true;

    function setupHero() {
      if (!heroLink || !heroWrap) return null;

      const imgA = document.createElement('img');
      const imgB = document.createElement('img');
      imgA.className = 'is-active';
      imgB.className = '';
      imgA.alt = '';
      imgB.alt = '';
      heroLink.appendChild(imgA);
      heroLink.appendChild(imgB);

      return { imgA, imgB };
    }

    const heroImgs = setupHero();

    function preload(src) {
      const im = new Image();
      im.src = src;
    }

    function swapTo(w) {
      if (!heroImgs || !w) return;
      const nextImg = showingA ? heroImgs.imgB : heroImgs.imgA;
      const currImg = showingA ? heroImgs.imgA : heroImgs.imgB;

      preload(w.thumb);
      nextImg.src = w.thumb;
      nextImg.alt = `work ${p3(slideIdx + 1)}`;
      heroLink.href = w.url;

      nextImg.classList.add('is-active');
      currImg.classList.remove('is-active');
      showingA = !showingA;
    }

    function showNext() {
      if (!worksForSlide.length) return;
      const w = worksForSlide[slideIdx % worksForSlide.length];
      swapTo(w);
      slideIdx++;
    }

    function startSlide() {
      if (timer || !worksForSlide.length) return;
      showNext();
      timer = setInterval(showNext, DURATION);
    }

    function stopSlide() {
      if (!timer) return;
      clearInterval(timer);
      timer = null;
    }

    // start when scrolled
    new MutationObserver(() => {
      if (document.body.classList.contains('scrolled')) startSlide();
    }).observe(document.body, { attributes: true, attributeFilter: ['class'] });

    // =========================
    // 5) Right list build
    // =========================
    const ul = document.getElementById('worksUl');
    if (ul) {
      works.forEach((w, i) => {
        const li = document.createElement('li');
        li.dataset.thumb = w.thumb;
        li.dataset.index = String(i);

        const a = document.createElement('a');
        a.href = w.url;
        a.innerHTML = `
          <span class="idx">${p3(i + 1)}</span>
          ${w.label ? `<span class="label">${w.label}</span>` : ''}
        `;
        li.appendChild(a);
        ul.prepend(li);
      });

      // number/date split (for hover animation on list)
      if (canHover) {
        ul.querySelectorAll('.idx, .label').forEach(splitToSpans);
      }
    }

    // =========================
    // 6) PC hover: list → hero swap / pause slideshow
    // =========================
    if (canHover && ul && heroLink && heroImgs) {
      ul.addEventListener('mouseenter', stopSlide);
      ul.addEventListener('mouseleave', startSlide);

      ul.addEventListener('mouseover', (e) => {
        const li = e.target.closest('li[data-index]');
        if (!li) return;
        const idx = Number(li.dataset.index);
        const w = works[idx];
        if (!w) return;
        swapTo(w);
        heroLink.href = w.url;
      });
    }

    // =========================
    // 7) Mobile tap: 1st tap preview / 2nd tap navigate
    // =========================
    const fullBox = document.getElementById('fullscreenPreview');
    const fullImg = document.getElementById('fullscreenPreviewImg');

    if (isTouchDevice && ul && fullBox && fullImg) {
      let armedLink = null;     // 1回目にタップしたリンク
      let resetTimer = null;

      ul.addEventListener('click', (e) => {
        const a = e.target.closest('a');
        if (!a || !ul.contains(a)) return;

        const li = a.closest('li[data-thumb]');
        if (!li) return;

        // 2回目（同じリンクなら遷移）
        if (armedLink === a) {
          fullBox.classList.remove('show');
          armedLink = null;
          if (resetTimer) clearTimeout(resetTimer);
          return; // preventDefaultしない = 遷移する
        }

        // 1回目：プレビューだけ
        e.preventDefault();
        armedLink = a;

        fullImg.src = li.dataset.thumb;
        fullBox.classList.add('show');

        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          armedLink = null;
          fullBox.classList.remove('show');
        }, 1600);
      });

      // tap preview to close
      fullBox.addEventListener('click', () => {
        fullBox.classList.remove('show');
        armedLink = null;
      });
    }

  })();
  </script>
</body>
</html>
